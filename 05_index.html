<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ep 5, One Vue Component Per File</title>
</head>

<body class="h-full grid place-items-center">
    <div id="app">
        <app-button>BONJOUR-</app-button>
        <app-button>MONCŒUR-</app-button>
        <app-button>BAGUETTE-</app-button>
        <app-button>PARIS</app-button>
    </div>

    <script type="module">
        import AppButton from './components/AppButton.js';
        let app =  {
            components : {
                'app-button' : AppButton,
            }
        }

    Vue.createApp(app).mount('#app');
    </script>
</body>
</html>
