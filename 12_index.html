<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Ep 12, A Deeper Look at v-model</title>
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full grid place-items-center bg-gray-600 text-white">
    <div id="app">
        <input type="text" :value="name" @input="name = $event.target.value" class="border p-2 rounded text-black" placeholder="Enter your name">

        <p class="mt-4">Selected tag: {{ selectedTag }}</p>
        <assignment-tags
            v-model="selectedTag"
            :initial-tags="['Vue', 'React', 'Vue', 'CSS', 'React']"
        ></assignment-tags>
    </div>

    <script type="module">
    import AssignmentTags from './components/11_AssignmentTags.js';

    Vue.createApp({
        components: { AssignmentTags },
        data() {
            return {
                name: '',
                selectedTag: 'all',
            }
        },
    }).mount('#app');
    </script>
</body>
</html>
