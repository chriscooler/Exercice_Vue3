<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Ep 3, Lists, Conditionals, and Computed Properties</title>
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full grid place-items-center">
    <div id="app">
        <section v-show="inProgress.length">
            <h2 class="font-bold mb-2">In Progress</h2>

            <!-- <ul>
                <li>Finish project <input type="checkbox"></li>
                <li>Reqd chapter 4 <input type="checkbox"></li>
                <li>Turn in homework <input type="checkbox">.</li>
            </ul> -->
            <ul>
                <li 
                    v-for="todo in inProgress" 
                    :key="todo.id"
                >
                <label>
                  {{ todo.name }}
                  <input type="checkbox" v-model="todo.done">   
                </label>
              </li>
            </ul>

            <!-- <pre>{{todos}}</pre> -->
        </section>

        <section v-show="completed.length" class="mt-8">
            <h2 class="mt-8 font-bold mb-2">Completed</h2>

            <ul>
                <li 
                    v-for="todo in completed" 
                    :key="todo.id"
                >
                    <label>
                        {{ todo.name }}
                        <input type="checkbox" v-model="todo.done">
                    </label>
                </li>
            </ul>
        </section>
    </div>

    <script>
        let app = {
            data() {
                return {
                    todos: [
                        { name: 'Finish Project', done: false, id: 1 },
                        { name: 'Read Chapter 4', done: false, id: 2 },
                        { name: 'Turn in Homework', done: false, id: 3 },
                    ]
                }
            },

            computed: {
                    // In Progress
                    inProgress() {
                        return this.todos.filter(t => !t.done);
                    },
    
                    // Completed
                    completed() {
                        return this.todos.filter(t => t.done);
                    }
                
            }
        }

       Vue.createApp(app).mount('#app');
    </script>
</body>
</html>
