<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <title>ep1, Les bases absolues</title>
    <script src="https://unpkg.com/vue@3"></script>
   
</head>
<body>
    <div id="app">
        <p>
            <input type="text" v-model="greeting" placeholder="Enter greeting">
        </p>
        <p>
            {{greeting}} ({{greeting.length}})
        </p>
    </div>

    <script>
        const app = Vue.createApp({
            data() {
                return {
                    greeting: 'Hello world!'
                };
            },

            mounted() {
                setTimeout(() => {
                    this.greeting = 'time out!';
                }, 2000);
            }
        })
        app.mount('#app')
    </script>
</body>
</html>
